<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scripts Commercial — C.lechantier</title>
<link href="https://fonts.googleapis.com/css2?family=Cabinet+Grotesk:wght@400;500;700;800&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f2ed;
  --surface: #ffffff;
  --surface2: #f0ece5;
  --border: #e2ddd6;
  --ink: #1a1814;
  --muted: #8c8278;
  --accent: #d4410b;
  --accent2: #2563eb;
  --accent3: #059669;
  --tag-irve: #2563eb;
  --tag-btp: #d4410b;
  --tag-r2: #7c3aed;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: 'Cabinet Grotesk', sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; }

/* TOP NAV — MODULE SWITCHER */
.module-nav {
  background: var(--ink);
  display: flex;
  align-items: center;
  padding: 0 40px;
  gap: 0;
  justify-content: space-between;
}
.module-nav-left {
  display: flex;
  align-items: center;
  gap: 0;
}
.logo {
  font-family: 'Instrument Serif', serif;
  font-size: 20px;
  letter-spacing: -0.5px;
  color: white;
  padding: 18px 24px 18px 0;
  border-right: 1px solid rgba(255,255,255,0.1);
  margin-right: 8px;
}
.logo span { color: var(--accent); font-style: italic; }
.module-btn {
  padding: 18px 22px;
  border: none;
  background: none;
  font-family: 'Cabinet Grotesk', sans-serif;
  font-size: 13px;
  font-weight: 700;
  color: rgba(255,255,255,0.45);
  cursor: pointer;
  border-bottom: 3px solid transparent;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 7px;
  white-space: nowrap;
}
.module-btn:hover { color: rgba(255,255,255,0.8); }
.module-btn.active { color: white; border-bottom-color: var(--accent); }
.module-badge {
  font-size: 10px;
  padding: 2px 7px;
  border-radius: 20px;
  font-weight: 700;
}
.badge-cc { background: rgba(212,65,11,0.25); color: #f97316; }
.badge-r1 { background: rgba(37,99,235,0.25); color: #60a5fa; }
.badge-r2 { background: rgba(124,58,237,0.25); color: #a78bfa; }
.header-sub { font-size: 12px; color: rgba(255,255,255,0.3); }

/* MODULES */
.module { display: none; }
.module.active { display: flex; flex-direction: column; height: calc(100vh - 57px); }

/* PERSONA TABS */
.persona-nav {
  background: var(--surface);
  border-bottom: 2px solid var(--border);
  padding: 0 40px;
  display: flex;
  gap: 0;
  overflow-x: auto;
  flex-shrink: 0;
}
.persona-btn {
  padding: 14px 18px;
  border: none;
  background: none;
  font-family: 'Cabinet Grotesk', sans-serif;
  font-size: 13px;
  font-weight: 700;
  color: var(--muted);
  cursor: pointer;
  border-bottom: 3px solid transparent;
  margin-bottom: -2px;
  white-space: nowrap;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 6px;
}
.persona-btn:hover { color: var(--ink); }
.persona-btn.active { color: var(--ink); border-bottom-color: var(--accent); }
.persona-tag { font-size: 10px; padding: 2px 6px; border-radius: 20px; font-weight: 700; }
.tag-irve { background: rgba(37,99,235,0.12); color: var(--tag-irve); }
.tag-btp  { background: rgba(212,65,11,0.12); color: var(--tag-btp); }
.tag-r2t  { background: rgba(124,58,237,0.12); color: var(--tag-r2); }

/* LAYOUT */
.module-body { display: flex; flex: 1; overflow: hidden; }

/* SIDEBAR */
.sidebar {
  width: 240px;
  flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  padding: 14px 0;
}
.step-item {
  padding: 10px 18px;
  cursor: pointer;
  display: flex;
  align-items: flex-start;
  gap: 10px;
  transition: background 0.15s;
  border-left: 3px solid transparent;
  position: relative;
}
.step-item:hover { background: var(--surface2); }
.step-item.active { background: var(--surface2); border-left-color: var(--accent); }
.step-item.completed .step-circle { background: var(--accent3); border-color: var(--accent3); color: white; }
.step-circle {
  width: 26px; height: 26px;
  border-radius: 50%;
  border: 2px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px;
  flex-shrink: 0;
  transition: all 0.2s;
  background: var(--surface);
}
.step-info { flex: 1; min-width: 0; }
.step-label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; }
.step-title { font-size: 13px; font-weight: 600; color: var(--ink); margin-top: 1px; line-height: 1.3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.step-connector {
  position: absolute;
  left: 30px;
  bottom: -8px;
  width: 2px;
  height: 8px;
  background: var(--border);
  z-index: 1;
}

/* CONTENT */
.content {
  flex: 1;
  overflow-y: auto;
  padding: 28px 36px;
  max-width: 820px;
}
.step-view { display: none; }
.step-view.active { display: block; }

/* STEP CARD */
.step-header { display: flex; align-items: flex-start; gap: 14px; margin-bottom: 22px; }
.step-emoji-big {
  width: 48px; height: 48px;
  background: var(--ink);
  color: white;
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}
.step-type { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); margin-bottom: 4px; }
.step-name { font-family: 'Instrument Serif', serif; font-size: 26px; line-height: 1.1; letter-spacing: -0.5px; }

/* Script box */
.script-box {
  background: var(--ink);
  color: #f5f2ed;
  border-radius: 12px;
  padding: 22px 26px;
  margin-bottom: 18px;
  position: relative;
}
.script-box-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: rgba(245,242,237,0.4); margin-bottom: 10px; }
.script-text { font-family: 'Instrument Serif', serif; font-size: 17px; line-height: 1.65; color: #f5f2ed; }
.script-text em { color: #fbbf24; font-style: normal; font-weight: 600; }
.copy-btn {
  position: absolute; top: 14px; right: 14px;
  background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15);
  border-radius: 6px; color: rgba(255,255,255,0.6); font-size: 11px;
  font-family: 'Cabinet Grotesk', sans-serif; font-weight: 600;
  padding: 4px 9px; cursor: pointer; transition: all 0.2s;
}
.copy-btn:hover { background: rgba(255,255,255,0.2); color: white; }

/* Tips */
.tips-box {
  background: rgba(37,99,235,0.06);
  border: 1px solid rgba(37,99,235,0.15);
  border-radius: 10px;
  padding: 14px 18px;
  margin-bottom: 18px;
}
.tips-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--accent2); margin-bottom: 8px; }
.tip-item { display: flex; gap: 8px; font-size: 13px; line-height: 1.5; color: #1e40af; margin-bottom: 5px; }
.tip-item:last-child { margin-bottom: 0; }
.tip-dot { color: var(--accent2); flex-shrink: 0; margin-top: 2px; }

/* Branches */
.branches-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 10px; }
.branches { display: flex; flex-direction: column; gap: 8px; margin-bottom: 22px; }
.branch-btn {
  background: var(--surface); border: 1.5px solid var(--border); border-radius: 10px;
  padding: 12px 16px; text-align: left; cursor: pointer;
  font-family: 'Cabinet Grotesk', sans-serif; font-size: 14px; font-weight: 600;
  color: var(--ink); transition: all 0.2s; display: flex; align-items: center; justify-content: space-between;
}
.branch-btn:hover { border-color: var(--accent); background: rgba(212,65,11,0.03); }
.branch-arrow { color: var(--muted); font-size: 18px; transition: transform 0.2s; }
.branch-btn:hover .branch-arrow { transform: translateX(3px); color: var(--accent); }

/* Objections */
.objections-grid { display: flex; flex-direction: column; gap: 10px; }
.objection-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
.objection-trigger { padding: 12px 16px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; font-weight: 700; font-size: 14px; transition: background 0.15s; }
.objection-trigger:hover { background: var(--surface2); }
.objection-badge { font-size: 10px; padding: 3px 8px; border-radius: 20px; background: rgba(212,65,11,0.1); color: var(--accent); font-weight: 700; }
.objection-body { display: none; padding: 14px 16px; border-top: 1px solid var(--border); background: var(--surface2); }
.objection-body.open { display: block; }
.objection-response { font-family: 'Instrument Serif', serif; font-size: 16px; line-height: 1.6; color: var(--ink); margin-bottom: 8px; }
.objection-tip { font-size: 12px; color: var(--muted); border-left: 3px solid var(--border); padding-left: 10px; margin-top: 8px; }

/* Checklist */
.checklist { display: flex; flex-direction: column; gap: 7px; margin-bottom: 18px; }
.check-item { display: flex; align-items: flex-start; gap: 10px; padding: 11px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; cursor: pointer; transition: all 0.15s; font-size: 14px; }
.check-item:hover { border-color: var(--accent); }
.check-item.checked { background: rgba(5,150,105,0.06); border-color: rgba(5,150,105,0.3); }
.check-box { width: 20px; height: 20px; border: 2px solid var(--border); border-radius: 4px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 12px; transition: all 0.15s; }
.check-item.checked .check-box { background: var(--accent3); border-color: var(--accent3); color: white; }

/* Nav buttons */
.step-nav { display: flex; gap: 10px; margin-top: 10px; padding-top: 22px; border-top: 1px solid var(--border); }
.nav-btn { padding: 9px 18px; border-radius: 8px; font-family: 'Cabinet Grotesk', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.2s; border: none; }
.nav-prev { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
.nav-prev:hover { color: var(--ink); }
.nav-next { background: var(--ink); color: white; margin-left: auto; }
.nav-next:hover { background: var(--accent); }
.nav-reset { background: rgba(212,65,11,0.1); color: var(--accent); border: 1px solid rgba(212,65,11,0.2); }
.nav-reset:hover { background: rgba(212,65,11,0.2); }

/* Progress bar */
.progress-bar { height: 3px; background: var(--border); position: relative; overflow: hidden; flex-shrink: 0; }
.progress-fill { height: 100%; background: var(--accent); transition: width 0.4s ease; }

/* Info block for R1/R2 intro */
.intro-card {
  background: linear-gradient(135deg, rgba(124,58,237,0.06) 0%, rgba(37,99,235,0.06) 100%);
  border: 1px solid rgba(124,58,237,0.15);
  border-radius: 12px;
  padding: 20px 24px;
  margin-bottom: 22px;
}
.intro-card-r1 {
  background: linear-gradient(135deg, rgba(37,99,235,0.06) 0%, rgba(5,150,105,0.06) 100%);
  border: 1px solid rgba(37,99,235,0.2);
}
.intro-title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
.intro-title-r1 { color: var(--accent2); }
.intro-title-r2 { color: var(--tag-r2); }
.intro-text { font-size: 14px; line-height: 1.6; color: var(--muted); }
.intro-text strong { color: var(--ink); }

/* Section title */
.section-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 10px; margin-top: 4px; }

/* Devis bloc — R2 specific */
.offer-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 22px; }
.offer-card {
  border: 2px solid var(--border);
  border-radius: 12px;
  padding: 16px;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
}
.offer-card:hover { border-color: var(--tag-r2); }
.offer-card.selected { border-color: var(--tag-r2); background: rgba(124,58,237,0.04); }
.offer-name { font-size: 13px; font-weight: 800; color: var(--ink); margin-bottom: 4px; }
.offer-price { font-family: 'JetBrains Mono', monospace; font-size: 18px; font-weight: 700; color: var(--tag-r2); margin-bottom: 8px; }
.offer-price small { font-size: 11px; color: var(--muted); font-family: 'Cabinet Grotesk', sans-serif; }
.offer-items { font-size: 12px; color: var(--muted); line-height: 1.6; }
.offer-badge {
  position: absolute; top: -8px; left: 50%; transform: translateX(-50%);
  background: var(--tag-r2); color: white; font-size: 10px; font-weight: 700;
  padding: 2px 10px; border-radius: 20px; white-space: nowrap;
}

/* Flag system */
.flags-grid { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 18px; }
.flag-btn {
  padding: 8px 14px; border-radius: 8px; font-family: 'Cabinet Grotesk', sans-serif;
  font-size: 12px; font-weight: 700; cursor: pointer; border: 1.5px solid;
  transition: all 0.2s;
}
.flag-green { border-color: rgba(5,150,105,0.3); color: var(--accent3); background: rgba(5,150,105,0.06); }
.flag-green:hover, .flag-green.active { background: rgba(5,150,105,0.15); }
.flag-orange { border-color: rgba(251,191,36,0.4); color: #d97706; background: rgba(251,191,36,0.06); }
.flag-orange:hover, .flag-orange.active { background: rgba(251,191,36,0.15); }
.flag-red { border-color: rgba(212,65,11,0.3); color: var(--accent); background: rgba(212,65,11,0.06); }
.flag-red:hover, .flag-red.active { background: rgba(212,65,11,0.15); }

/* ROI calc */
.roi-block {
  background: var(--ink);
  color: white;
  border-radius: 12px;
  padding: 20px 24px;
  margin-bottom: 18px;
}
.roi-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: rgba(255,255,255,0.4); margin-bottom: 12px; }
.roi-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; font-size: 14px; border-bottom: 1px solid rgba(255,255,255,0.08); padding-bottom: 8px; }
.roi-row:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
.roi-label-text { color: rgba(255,255,255,0.6); }
.roi-value { font-family: 'JetBrains Mono', monospace; font-size: 15px; font-weight: 700; color: #34d399; }
.roi-value.cost { color: #f87171; }
.roi-input {
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 6px;
  color: white;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  padding: 4px 8px;
  width: 80px;
  outline: none;
  text-align: right;
}
.roi-input:focus { border-color: #fbbf24; }

/* Edit mode inline */
.edit-btn {
  position: absolute; top: 14px; right: 72px;
  background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15);
  border-radius: 6px; color: rgba(255,255,255,0.6); font-size: 11px;
  font-family: 'Cabinet Grotesk', sans-serif; font-weight: 600;
  padding: 4px 9px; cursor: pointer; transition: all 0.2s;
}
.edit-btn:hover { background: rgba(255,200,0,0.2); color: #fbbf24; border-color: rgba(255,200,0,0.3); }
.edit-btn.active { background: rgba(5,150,105,0.2); color: #34d399; border-color: rgba(5,150,105,0.3); }
.script-textarea {
  width: 100%; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.15);
  border-radius: 8px; color: #f5f2ed;
  font-family: 'Instrument Serif', serif; font-size: 17px; line-height: 1.65;
  padding: 12px; resize: vertical; min-height: 120px; outline: none; margin-top: 4px;
}
.script-textarea:focus { border-color: #fbbf24; }
.edit-hint { font-size: 11px; color: rgba(245,242,237,0.35); margin-top: 8px; font-family: 'Cabinet Grotesk', sans-serif; }
/* Edit panel */
.edit-panel {
  display: none; background: var(--surface); border: 2px solid var(--accent2);
  border-radius: 14px; padding: 24px; margin-bottom: 24px;
}
.edit-panel.open { display: block; }
.edit-panel-title {
  font-family: 'Cabinet Grotesk', sans-serif; font-size: 13px; font-weight: 700;
  color: var(--accent2); text-transform: uppercase; letter-spacing: 1px;
  margin-bottom: 20px; display: flex; align-items: center; gap: 8px;
}
.edit-section { margin-bottom: 18px; }
.edit-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 6px; }
.edit-input {
  width: 100%; padding: 9px 12px; border: 1.5px solid var(--border); border-radius: 8px;
  font-family: 'Cabinet Grotesk', sans-serif; font-size: 14px; color: var(--ink);
  background: var(--bg); outline: none; transition: border-color 0.2s;
}
.edit-input:focus { border-color: var(--accent2); }
.edit-textarea {
  width: 100%; padding: 10px 12px; border: 1.5px solid var(--border); border-radius: 8px;
  font-family: 'Instrument Serif', serif; font-size: 16px; line-height: 1.6;
  color: var(--ink); background: var(--bg); outline: none; resize: vertical;
  min-height: 100px; transition: border-color 0.2s;
}
.edit-textarea:focus { border-color: var(--accent2); }
.edit-list-item { display: flex; gap: 8px; align-items: flex-start; margin-bottom: 8px; }
.edit-list-item input, .edit-list-item textarea {
  flex: 1; padding: 7px 10px; border: 1.5px solid var(--border); border-radius: 7px;
  font-family: 'Cabinet Grotesk', sans-serif; font-size: 13px; color: var(--ink);
  background: var(--bg); outline: none;
}
.edit-list-item input:focus { border-color: var(--accent2); }
.edit-del-btn {
  width: 30px; height: 30px; border-radius: 6px; border: 1px solid var(--border);
  background: none; color: var(--muted); cursor: pointer; font-size: 13px;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  transition: all 0.15s; margin-top: 2px;
}
.edit-del-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(212,65,11,0.05); }
.edit-add-btn {
  padding: 7px 14px; border-radius: 7px; border: 1.5px dashed var(--border); background: none;
  color: var(--muted); font-family: 'Cabinet Grotesk', sans-serif; font-size: 12px; font-weight: 700;
  cursor: pointer; transition: all 0.2s; margin-top: 4px; width: 100%;
}
.edit-add-btn:hover { border-color: var(--accent2); color: var(--accent2); }
.edit-save-btn {
  padding: 11px 24px; border-radius: 8px; border: none; background: var(--accent2); color: white;
  font-family: 'Cabinet Grotesk', sans-serif; font-size: 14px; font-weight: 700;
  cursor: pointer; transition: all 0.2s; margin-top: 20px; width: 100%;
}
.edit-save-btn:hover { background: #1d4ed8; }
.edit-step-actions { display: flex; gap: 8px; margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border); }
.edit-danger-btn {
  padding: 8px 16px; border-radius: 7px; border: 1px solid rgba(212,65,11,0.3);
  background: rgba(212,65,11,0.06); color: var(--accent);
  font-family: 'Cabinet Grotesk', sans-serif; font-size: 12px; font-weight: 700;
  cursor: pointer; transition: all 0.2s;
}
.edit-danger-btn:hover { background: rgba(212,65,11,0.15); }
.branch-target-input { width: 90px !important; flex: none !important; font-size: 11px; color: var(--muted); }
.nav-edit { background: rgba(37,99,235,0.1); color: var(--accent2); border: 1px solid rgba(37,99,235,0.2); }
.nav-edit:hover { background: rgba(37,99,235,0.2); }
.nav-edit.editing { background: rgba(5,150,105,0.1); color: var(--accent3); border-color: rgba(5,150,105,0.3); }

/* Scrollbar */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* Toast */
.toast-el { position:fixed; bottom:24px; right:24px; background:var(--ink); color:white; padding:10px 18px; border-radius:8px; font-size:13px; font-weight:600; z-index:9999; box-shadow:0 4px 20px rgba(0,0,0,0.2); }

@media (max-width: 768px) {
  .module-body { flex-direction: column; }
  .sidebar { width: 100%; height: auto; border-right: none; border-bottom: 1px solid var(--border); display: flex; overflow-x: auto; padding: 8px; gap: 4px; }
  .step-item { flex-direction: column; align-items: center; padding: 8px; min-width: 70px; border-left: none; border-bottom: 3px solid transparent; }
  .step-item.active { border-bottom-color: var(--accent); border-left: none; }
  .step-connector { display: none; }
  .step-title { display: none; }
  .content { padding: 18px; }
  .module-nav, .persona-nav { padding-left: 16px; padding-right: 16px; }
  .offer-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- TOP NAV -->
<nav class="module-nav">
  <div class="module-nav-left">
    <div class="logo">C.<span>lechantier</span></div>

// ENGINE — GENERIC MODULE RENDERER
// =====================================================================
let modules = {
  cc: { personas: CC_PERSONAS, current: 0, currentStep: 0, visited: new Set([0]) },
  r1: { personas: R1_PERSONAS, current: 0, currentStep: 0, visited: new Set([0]) },
  r2: { personas: R2_PERSONAS, current: 0, currentStep: 0, visited: new Set([0]) },
};
let activeModule = 'cc';

function switchModule(m) {
  document.querySelectorAll('.module').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.module-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('module-' + m).classList.add('active');
  document.getElementById('btn-' + m).classList.add('active');
  activeModule = m;
  renderModule(m);
}

function getMod() { return modules[activeModule]; }
function getPersonas() { return getMod().personas; }
function getPersona() { return getPersonas()[getMod().current]; }
function getSteps() { return getPersona().steps; }
function getStep() { return getSteps()[getMod().currentStep]; }

function renderModule(m) {
  activeModule = m;
  renderPersonaNav(m);
  renderSidebar(m);
  renderContent(m);
}

function renderPersonaNav(m) {
  const mod = modules[m];
  const personas = mod.personas;
  const nav = document.getElementById(m + '-persona-nav');
  nav.innerHTML = personas.map((p, i) => `
    <button class="persona-btn ${i === mod.current ? 'active' : ''}" onclick="selectPersona('${m}', ${i})">
      ${p.emoji} ${p.label}
      <span class="persona-tag ${p.tagClass}">${p.tag}</span>
    </button>
  `).join('');
}

function selectPersona(m, i) {
  modules[m].current = i;
  modules[m].currentStep = 0;
  modules[m].visited = new Set([0]);
  renderModule(m);
}

function renderSidebar(m) {
  const mod = modules[m];
  const steps = modules[m].personas[mod.current].steps;
  const sb = document.getElementById(m + '-sidebar');
  sb.innerHTML = steps.map((step, i) => `
    <div class="step-item ${i === mod.currentStep ? 'active' : ''} ${mod.visited.has(i) && i !== mod.currentStep ? 'completed' : ''}"
         onclick="goToStep('${m}', '${step.id}')">
      <div class="step-circle">${mod.visited.has(i) && i !== mod.currentStep ? '✓' : (i + 1)}</div>
      <div class="step-info">
        <div class="step-label">${step.type}</div>
        <div class="step-title">${step.title}</div>
      </div>
      ${i < steps.length - 1 ? '<div class="step-connector"></div>' : ''}
    </div>
  `).join('');
  // Progress
  const pct = Math.round((mod.visited.size / steps.length) * 100);
  const pbar = document.getElementById(m + '-progress');
  if (pbar) pbar.querySelector ? null : null;
  document.getElementById(m + '-progress').style.width = pct + '%';
}

function goToStep(m, id) {
  const steps = modules[m].personas[modules[m].current].steps;
  const idx = steps.findIndex(s => s.id === id);
  if (idx === -1) return;
  modules[m].currentStep = idx;
  modules[m].visited.add(idx);
  renderSidebar(m);
  renderContent(m);
  document.getElementById(m + '-content').scrollTop = 0;
}

function renderContent(m) {
  const mod = modules[m];
  const persona = mod.personas[mod.current];
  const step = persona.steps[mod.currentStep];
  const steps = persona.steps;
  const prevStep = mod.currentStep > 0 ? steps[mod.currentStep - 1] : null;
  const nextStep = mod.currentStep < steps.length - 1 ? steps[mod.currentStep + 1] : null;
  const content = document.getElementById(m + '-content');

  const scriptHtml = step.script ? step.script.replace(/\n/g, '<br>') : '';

  const objections = persona.objections || [];
  const showObjOnStep = ['closing','pitch','difficultes','cloture-r1','closing-r2','presentation-offres'];
  const objHtml = objections.length && (showObjOnStep.includes(step.id) || step.branches.length === 0)
    ? `<div style="margin-top:28px;padding-top:22px;border-top:1px solid var(--border)">
        <div class="branches-label">🛡 Objections fréquentes</div>
        <div class="objections-grid">
          ${objections.map((o, i) => `
            <div class="objection-card">
              <div class="objection-trigger" onclick="toggleObjM('${m}',${i})">
                <span>${o.trigger}</span><span class="objection-badge">Réponse</span>
              </div>
              <div class="objection-body" id="${m}-obj-${i}">
                <div class="objection-response">${o.response}</div>
                ${o.tip ? `<div class="objection-tip">💡 ${o.tip}</div>` : ''}
              </div>
            </div>
          `).join('')}
        </div>
      </div>` : '';

  content.innerHTML = `
    <div class="step-view active">
      <div class="step-header">
        <div class="step-emoji-big">${step.emoji}</div>
        <div>
          <div class="step-type">${step.type}</div>
          <div class="step-name">${step.title}</div>
        </div>
      </div>

      ${step.script ? `
      <div class="script-box" id="${m}-script-box">
        <div class="script-box-label">📝 Ce que vous dites</div>
        <button class="edit-btn" id="${m}-edit-btn" onclick="toggleEditMode('${m}')">✏️ Modifier</button>
        <button class="copy-btn" onclick="copyScript('${m}')">Copier</button>
        <div class="script-text" id="${m}-script-text">${scriptHtml}</div>
        <div class="edit-hint" id="${m}-edit-hint" style="display:none">Les modifications sont sauvegardées en mémoire</div>
      </div>
      ` : ''}

      ${step.checklist ? `
        <div class="section-title">Checklist</div>
        <div class="checklist">
          ${step.checklist.map((q, i) => `
            <div class="check-item" id="${m}-chk-${i}" onclick="toggleCheck('${m}',${i})">
              <div class="check-box" id="${m}-chkbox-${i}"></div>
              <span>${q}</span>
            </div>
          `).join('')}
        </div>
      ` : ''}

      ${step.tips && step.tips.length > 0 ? `
      <div class="tips-box">
        <div class="tips-label">💡 Conseils</div>
        ${step.tips.map(t => `<div class="tip-item"><span class="tip-dot">→</span><span>${t}</span></div>`).join('')}
      </div>
      ` : ''}

      ${step.branches && step.branches.length > 0 ? `
        <div class="branches-label">RÉPONSE DU PROSPECT →</div>
        <div class="branches">
          ${step.branches.map(b => `
            <button class="branch-btn" onclick="goToStep('${m}','${b.to}')">
              ${b.label}<span class="branch-arrow">→</span>
            </button>
          `).join('')}
        </div>
      ` : ''}

      ${objHtml}

      <!-- EDIT PANEL -->
      <div class="edit-panel" id="${m}-edit-panel">
        <div class="edit-panel-title">✏️ Modifier cette étape</div>

        <div class="edit-section">
          <div class="edit-label">Titre de l'étape</div>
          <input class="edit-input" id="${m}-ep-title" value="${(step.title||'').replace(/"/g,'&quot;')}">
        </div>
        <div class="edit-section">
          <div class="edit-label">Type / label</div>
          <input class="edit-input" id="${m}-ep-type" value="${(step.type||'').replace(/"/g,'&quot;')}">
        </div>
        <div class="edit-section">
          <div class="edit-label">Script (ce que vous dites)</div>
          <textarea class="edit-textarea" id="${m}-ep-script" style="min-height:120px">${(step.script||'').replace(/<em>/g,'').replace(/<\/em>/g,'').replace(/<br>/g,'\n')}</textarea>
        </div>
        <div class="edit-section">
          <div class="edit-label">Conseils (tips)</div>
          <div id="${m}-ep-tips-list">
            ${(step.tips||[]).map((t,i) => `
              <div class="edit-list-item" id="${m}-tip-row-${i}">
                <input value="${t.replace(/"/g,'&quot;')}">
                <button class="edit-del-btn" onclick="this.parentElement.remove()">🗑</button>
              </div>`).join('')}
          </div>
          <button class="edit-add-btn" onclick="addTipM('${m}')">+ Ajouter un conseil</button>
        </div>
        <div class="edit-section">
          <div class="edit-label">Checklist</div>
          <div id="${m}-ep-checklist-list">
            ${(step.checklist||[]).map((q,i) => `
              <div class="edit-list-item" id="${m}-chkl-row-${i}">
                <input value="${q.replace(/"/g,'&quot;')}">
                <button class="edit-del-btn" onclick="this.parentElement.remove()">🗑</button>
              </div>`).join('')}
          </div>
          <button class="edit-add-btn" onclick="addChecklistM('${m}')">+ Ajouter une question</button>
        </div>
        <div class="edit-section">
          <div class="edit-label">Branches (réponses prospect)</div>
          <div id="${m}-ep-branches-list">
            ${(step.branches||[]).map((b,i) => `
              <div class="edit-list-item" id="${m}-branch-row-${i}">
                <input placeholder="Label" value="${b.label.replace(/"/g,'&quot;')}">
                <input class="branch-target-input" placeholder="→ étape" value="${b.to}" style="width:90px;flex:none">
                <button class="edit-del-btn" onclick="this.parentElement.remove()">🗑</button>
              </div>`).join('')}
          </div>
          <button class="edit-add-btn" onclick="addBranchM('${m}')">+ Ajouter une branche</button>
        </div>
        <div class="edit-section">
          <div class="edit-label">Objections (panel de ce persona)</div>
          <div id="${m}-ep-obj-list">
            ${(persona.objections||[]).map((o,i) => `
              <div id="${m}-obj-row-${i}" style="display:flex;flex-direction:column;gap:6px;background:var(--surface2);padding:10px;border-radius:8px;border:1px solid var(--border);margin-bottom:8px">
                <div style="display:flex;gap:8px;align-items:center">
                  <span style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;width:55px;flex-shrink:0">Trigger</span>
                  <input style="flex:1;padding:6px 9px;border:1.5px solid var(--border);border-radius:7px;font-size:13px;background:var(--bg);outline:none" value="${o.trigger.replace(/"/g,'&quot;')}">
                  <button class="edit-del-btn" onclick="this.closest('[id]').remove()">🗑</button>
                </div>
                <div style="display:flex;gap:8px;align-items:flex-start">
                  <span style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;width:55px;flex-shrink:0;margin-top:8px">Réponse</span>
                  <textarea style="flex:1;padding:6px 9px;border:1.5px solid var(--border);border-radius:7px;font-size:13px;background:var(--bg);outline:none;min-height:55px;resize:vertical">${o.response}</textarea>
                </div>
                <div style="display:flex;gap:8px;align-items:center">
                  <span style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;width:55px;flex-shrink:0">Conseil</span>
                  <input style="flex:1;padding:6px 9px;border:1.5px solid var(--border);border-radius:7px;font-size:13px;background:var(--bg);outline:none" value="${(o.tip||'').replace(/"/g,'&quot;')}">
                </div>
              </div>`).join('')}
          </div>
          <button class="edit-add-btn" onclick="addObjM('${m}')">+ Ajouter une objection</button>
        </div>
        <button class="edit-save-btn" onclick="saveEditPanelM('${m}')">✅ Sauvegarder toutes les modifications</button>
        <div class="edit-step-actions">
          <button class="edit-danger-btn" onclick="deleteStepM('${m}')">🗑 Supprimer cette étape</button>
          <button class="edit-add-btn" style="margin-top:0;border-style:dashed;width:auto" onclick="addStepAfterM('${m}')">+ Ajouter une étape après</button>
        </div>
      </div>

      <div class="step-nav">
        ${prevStep ? `<button class="nav-btn nav-prev" onclick="goToStep('${m}','${prevStep.id}')">← ${prevStep.title}</button>` : ''}
        <button class="nav-btn nav-reset" onclick="resetModule('${m}')">↺ Recommencer</button>
        <button class="nav-btn nav-edit" id="${m}-nav-edit-btn" onclick="toggleEditPanel('${m}')">✏️ Modifier l'étape</button>
        ${nextStep ? `<button class="nav-btn nav-next" onclick="goToStep('${m}','${nextStep.id}')">Suivant →</button>` : ''}
      </div>
    </div>
  `;
}

function toggleCheck(m, i) {
  const item = document.getElementById(`${m}-chk-${i}`);
  const box  = document.getElementById(`${m}-chkbox-${i}`);
  item.classList.toggle('checked');
  box.textContent = item.classList.contains('checked') ? '✓' : '';
}

function toggleObjM(m, i) {
  document.getElementById(`${m}-obj-${i}`)?.classList.toggle('open');
}

function copyScript(m) {
  const el = document.getElementById(`${m}-script-text`);
  if (!el) return;
  const txt = el.innerText || '';
  navigator.clipboard.writeText(txt).then(() => {
    toast('Script copié ✓');
  });
}

function resetModule(m) {
  modules[m].currentStep = 0;
  modules[m].visited = new Set([0]);
  renderSidebar(m);
  renderContent(m);
}

function toast(msg) {
  const el = document.createElement('div');
  el.className = 'toast-el';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2500);
}

// =====================================================================
// EDITOR FUNCTIONS
// =====================================================================
function toggleEditMode(m) {
  const scriptText = document.getElementById(`${m}-script-text`);
  const editBtn    = document.getElementById(`${m}-edit-btn`);
  const editHint   = document.getElementById(`${m}-edit-hint`);
  if (!scriptText || !editBtn) return;
  const isEditing = editBtn.classList.contains('active');
  if (!isEditing) {
    const current = scriptText.innerText;
    scriptText.style.display = 'none';
    const ta = document.createElement('textarea');
    ta.className = 'script-textarea'; ta.id = `${m}-script-editor`; ta.value = current;
    scriptText.parentNode.insertBefore(ta, scriptText.nextSibling);
    ta.focus();
    editBtn.textContent = '✅ Sauvegarder'; editBtn.classList.add('active');
    if (editHint) editHint.style.display = 'block';
  } else {
    const ta = document.getElementById(`${m}-script-editor`);
    if (ta) {
      modules[m].personas[modules[m].current].steps[modules[m].currentStep].script = ta.value.trim();
      scriptText.innerHTML = ta.value.trim().replace(/\n/g,'<br>');
      scriptText.style.display = ''; ta.remove();
    }
    editBtn.textContent = '✏️ Modifier'; editBtn.classList.remove('active');
    if (editHint) editHint.style.display = 'none';
    toast('Script sauvegardé ✓');
  }
}

function toggleEditPanel(m) {
  const panel = document.getElementById(`${m}-edit-panel`);
  const btn   = document.getElementById(`${m}-nav-edit-btn`);
  if (!panel) return;
  const isOpen = panel.classList.toggle('open');
  if (btn) {
    btn.textContent = isOpen ? "✖ Fermer l'éditeur" : '✏️ Modifier l\'étape';
    btn.classList.toggle('editing', isOpen);
  }
  if (isOpen) panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function addTipM(m) {
  const list = document.getElementById(`${m}-ep-tips-list`);
  const row = document.createElement('div');
  row.className = 'edit-list-item';
  row.innerHTML = `<input placeholder="Nouveau conseil..."><button class="edit-del-btn" onclick="this.parentElement.remove()">🗑</button>`;
  list.appendChild(row);
}

function addChecklistM(m) {
  const list = document.getElementById(`${m}-ep-checklist-list`);
  const row = document.createElement('div');
  row.className = 'edit-list-item';
  row.innerHTML = `<input placeholder="Nouvelle question..."><button class="edit-del-btn" onclick="this.parentElement.remove()">🗑</button>`;
  list.appendChild(row);
}

function addBranchM(m) {
  const list = document.getElementById(`${m}-ep-branches-list`);
  const row = document.createElement('div');
  row.className = 'edit-list-item';
  row.innerHTML = `<input placeholder="Label de la réponse..."><input style="width:90px;flex:none;padding:7px 8px;border:1.5px solid var(--border);border-radius:7px;font-size:11px;color:var(--muted);background:var(--bg);outline:none" placeholder="→ id étape"><button class="edit-del-btn" onclick="this.parentElement.remove()">🗑</button>`;
  list.appendChild(row);
}

function addObjM(m) {
  const list = document.getElementById(`${m}-ep-obj-list`);
  const div = document.createElement('div');
  div.style.cssText = 'display:flex;flex-direction:column;gap:6px;background:var(--surface2);padding:10px;border-radius:8px;border:1px solid var(--border);margin-bottom:8px';
  div.innerHTML = `
    <div style="display:flex;gap:8px;align-items:center">
      <span style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;width:55px;flex-shrink:0">Trigger</span>
      <input style="flex:1;padding:6px 9px;border:1.5px solid var(--border);border-radius:7px;font-size:13px;background:var(--bg);outline:none" placeholder="L'objection...">
      <button class="edit-del-btn" onclick="this.closest('div[style]').remove()">🗑</button>
    </div>
    <div style="display:flex;gap:8px;align-items:flex-start">
      <span style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;width:55px;flex-shrink:0;margin-top:8px">Réponse</span>
      <textarea style="flex:1;padding:6px 9px;border:1.5px solid var(--border);border-radius:7px;font-size:13px;background:var(--bg);outline:none;min-height:55px;resize:vertical" placeholder="La réponse..."></textarea>
    </div>
    <div style="display:flex;gap:8px;align-items:center">
      <span style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;width:55px;flex-shrink:0">Conseil</span>
      <input style="flex:1;padding:6px 9px;border:1.5px solid var(--border);border-radius:7px;font-size:13px;background:var(--bg);outline:none" placeholder="Conseil optionnel...">
    </div>`;
  list.appendChild(div);
}

function saveEditPanelM(m) {
  const mod = modules[m];
  const step = mod.personas[mod.current].steps[mod.currentStep];
  const persona = mod.personas[mod.current];

  step.title = document.getElementById(`${m}-ep-title`)?.value.trim() || step.title;
  step.type  = document.getElementById(`${m}-ep-type`)?.value.trim()  || step.type;

  const newScript = document.getElementById(`${m}-ep-script`)?.value.trim();
  if (newScript !== undefined) step.script = newScript;

  const tipInputs = document.querySelectorAll(`#${m}-ep-tips-list .edit-list-item input`);
  step.tips = Array.from(tipInputs).map(i => i.value.trim()).filter(Boolean);

  const chklInputs = document.querySelectorAll(`#${m}-ep-checklist-list .edit-list-item input`);
  const chkl = Array.from(chklInputs).map(i => i.value.trim()).filter(Boolean);
  if (chkl.length) step.checklist = chkl; else delete step.checklist;

  const branchRows = document.querySelectorAll(`#${m}-ep-branches-list .edit-list-item`);
  step.branches = Array.from(branchRows).map(row => {
    const inputs = row.querySelectorAll('input');
    return { label: inputs[0]?.value.trim()||'', to: inputs[1]?.value.trim()||'' };
  }).filter(b => b.label);

  const objRows = document.querySelectorAll(`#${m}-ep-obj-list > div`);
  persona.objections = Array.from(objRows).map(row => {
    const inputs = row.querySelectorAll('input');
    const ta = row.querySelector('textarea');
    return { trigger: inputs[0]?.value.trim()||'', response: ta?.value.trim()||'', tip: inputs[1]?.value.trim()||'' };
  }).filter(o => o.trigger);

  renderSidebar(m);
  renderContent(m);
  setTimeout(() => { toggleEditPanel(m); toast('✅ Modifications sauvegardées'); }, 50);
}

function deleteStepM(m) {
  const mod = modules[m];
  const steps = mod.personas[mod.current].steps;
  if (steps.length <= 1) { toast('Impossible — il faut au moins une étape'); return; }
  if (!confirm('Supprimer cette étape ?')) return;
  steps.splice(mod.currentStep, 1);
  mod.currentStep = Math.max(0, mod.currentStep - 1);
  renderSidebar(m); renderContent(m);
  toast('Étape supprimée');
}

function addStepAfterM(m) {
  const mod = modules[m];
  const steps = mod.personas[mod.current].steps;
  const newStep = {
    id: 'etape-' + Date.now(), emoji: '🆕', type: 'Nouvelle étape',
    title: 'Nouvelle étape', script: 'Votre script ici...', tips: [], branches: []
  };
  steps.splice(mod.currentStep + 1, 0, newStep);
  mod.currentStep = mod.currentStep + 1;
  mod.visited.add(mod.currentStep);
  renderSidebar(m); renderContent(m);
  setTimeout(() => toggleEditPanel(m), 50);
  toast("Étape ajoutée — modifiez-la dans l'éditeur");
}

// =====================================================================
// INIT
// =====================================================================
renderModule('cc');
renderModule('r1');
renderModule('r2');
</script>
</body>
</html>
